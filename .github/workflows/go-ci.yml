name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build
        run: make build

      - name: Run tests
        run: |
          if [ -d "./internal" ]; then
            go test ./internal/...
          else
            echo "No internal tests found."
          fi
